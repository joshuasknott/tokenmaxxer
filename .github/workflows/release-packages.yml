name: Release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            script: pnpm tauri build --bundles nsis --ci
            unsigned_script: pnpm run package:windows
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig
          - platform: macos
            os: macos-15-intel
            script: pnpm tauri build --target universal-apple-darwin --bundles app,dmg --ci
            unsigned_script: pnpm run package:macos
            artifact_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
              TokenMaxxer-macos-app.zip
          - platform: linux
            os: ubuntu-22.04
            script: pnpm tauri build --bundles appimage,deb --ci
            unsigned_script: pnpm run package:linux
            artifact_paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libsecret-1-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine release mode
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "PRODUCTION_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRODUCTION_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Verify production signing secrets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          missing=0

          require_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::${name} is required for signed production releases."
              missing=1
            fi
          }

          require_secret TAURI_SIGNING_PRIVATE_KEY

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::notice::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty. This is only valid for a passwordless updater key."
          fi

          case "${{ matrix.platform }}" in
            windows)
              require_secret WINDOWS_CERTIFICATE_BASE64
              require_secret WINDOWS_CERTIFICATE_PASSWORD
              require_secret WINDOWS_CERTIFICATE_THUMBPRINT
              ;;
            macos)
              require_secret APPLE_CERTIFICATE
              require_secret APPLE_CERTIFICATE_PASSWORD
              require_secret KEYCHAIN_PASSWORD
              require_secret APPLE_API_KEY
              require_secret APPLE_API_ISSUER
              require_secret APPLE_API_PRIVATE_KEY_BASE64
              ;;
          esac

          exit "$missing"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}

      - name: Import Windows code signing certificate
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $certDir = Join-Path $env:RUNNER_TEMP "codesign"
          New-Item -ItemType Directory -Path $certDir -Force | Out-Null

          $pfxPath = Join-Path $certDir "tokenmaxxer.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))

          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null

          $thumbprint = ($env:WINDOWS_CERTIFICATE_THUMBPRINT -replace '\s', '').ToUpperInvariant()
          $configPath = (Join-Path $env:RUNNER_TEMP "tauri-windows-signing.json").Replace('\', '/')
          @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
                tsp = $false
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content -Path $configPath -Encoding utf8

          "TAURI_EXTRA_CONFIG=$configPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/tokenmaxxer-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          cert_id="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$cert_id" ]; then
            echo "::error::No Developer ID Application identity was found in the imported certificate."
            security find-identity -v -p codesigning "$keychain_path"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Prepare Apple notarization API key
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$api_key_path"
          chmod 600 "$api_key_path"

          echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}

      - name: Build platform bundle
        shell: bash
        run: |
          if [ "$PRODUCTION_RELEASE" = "true" ]; then
            extra_args=()
            if [ -n "${TAURI_EXTRA_CONFIG:-}" ]; then
              extra_args+=(--config "$TAURI_EXTRA_CONFIG")
            fi
            ${{ matrix.script }} "${extra_args[@]}"
          else
            ${{ matrix.unsigned_script }}
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verify platform artifacts
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows)
              test -n "$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -name '*.exe' -print -quit)" || { echo "::error::Missing Windows installer."; exit 1; }
              if [ "$PRODUCTION_RELEASE" = "true" ]; then
                test -n "$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -name '*.exe.sig' -print -quit)" || { echo "::error::Missing Windows updater signature."; exit 1; }
              fi
              ;;
            macos)
              test -n "$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)" || { echo "::error::Missing macOS DMG."; exit 1; }
              test -n "$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)" || { echo "::error::Missing macOS app bundle."; exit 1; }
              if [ "$PRODUCTION_RELEASE" = "true" ]; then
                test -n "$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' -print -quit)" || { echo "::error::Missing macOS updater archive."; exit 1; }
                test -n "$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz.sig' -print -quit)" || { echo "::error::Missing macOS updater signature."; exit 1; }
              fi
              ;;
            linux)
              test -n "$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' -print -quit)" || { echo "::error::Missing Linux AppImage."; exit 1; }
              test -n "$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name '*.deb' -print -quit)" || { echo "::error::Missing Linux deb package."; exit 1; }
              if [ "$PRODUCTION_RELEASE" = "true" ]; then
                test -n "$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage.sig' -print -quit)" || { echo "::error::Missing Linux updater signature."; exit 1; }
              fi
              ;;
          esac

      - name: Verify Windows Authenticode signature
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            Write-Error "Missing Windows installer."
            exit 1
          }

          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          $signature | Format-List Status,StatusMessage,SignerCertificate,TimeStamperCertificate
          if ($signature.Status -ne "Valid") {
            Write-Error "Windows installer signature is $($signature.Status)."
            exit 1
          }

      - name: Verify macOS signing and notarization
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          app_path="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          dmg_path="$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"

      - name: Verify Linux package metadata
        if: runner.os == 'Linux'
        shell: bash
        run: |
          deb_path="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name '*.deb' -print -quit)"

          test "$(dpkg-deb --field "$deb_path" Package)" = "tokenmaxxer"
          test "$(dpkg-deb --field "$deb_path" Section)" = "utils"
          test "$(dpkg-deb --field "$deb_path" Priority)" = "optional"
          dpkg-deb --field "$deb_path" Maintainer | grep -q "Josh Knott"
          dpkg-deb --field "$deb_path" Depends | grep -q "libwebkit2gtk-4.1-0"
          dpkg-deb --contents "$deb_path" | grep -q "/usr/share/applications/.*\\.desktop$"

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle was produced."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" TokenMaxxer-macos-app.zip

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokenmaxxer-${{ matrix.platform }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare stable release asset names
        run: node scripts/prepare-release-artifacts.mjs release-artifacts release-publish

      - name: Generate updater manifest
        run: node scripts/create-updater-manifest.mjs release-publish latest.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-publish/**/*
            latest.json
          fail_on_unmatched_files: true
