<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>TokenMaxxer Product Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #071016;
        color: #f3f7fb;
        font-family: system-ui, sans-serif;
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 68% 28%, rgba(96, 165, 250, 0.18), transparent 31%),
          radial-gradient(circle at 27% 72%, rgba(34, 197, 183, 0.13), transparent 34%),
          #071016;
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0.1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: radial-gradient(circle at 50% 50%, black, transparent 76%);
      }

      .scene-content {
        position: relative;
        z-index: 5;
        display: grid;
        grid-template-columns: 0.78fr 1.22fr;
        gap: 82px;
        width: 100%;
        height: 100%;
        padding: 88px 106px;
        align-items: center;
      }

      .brand-stage {
        min-width: 0;
      }

      .brand-lockup {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .brand-lockup img {
        width: 132px;
        height: 132px;
        object-fit: contain;
        filter: drop-shadow(0 20px 34px rgba(0, 0, 0, 0.32));
      }

      .brand-name {
        font-size: 64px;
        font-weight: 900;
        line-height: 0.98;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .eyebrow {
        margin-top: 58px;
        color: #7bd8ce;
        font-size: 22px;
        font-weight: 850;
        letter-spacing: 0.1em;
        line-height: 1.4;
        text-transform: uppercase;
      }

      .headline {
        max-width: 590px;
        margin-top: 20px;
        font-size: 78px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.96;
      }

      .support {
        max-width: 560px;
        margin-top: 30px;
        color: #c7d4dc;
        font-size: 25px;
        font-weight: 400;
        line-height: 1.5;
      }

      .demo-stage {
        position: relative;
        min-width: 0;
        perspective: 1800px;
      }

      .product-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 1280 / 1060;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.26);
        border-radius: 12px;
        background: #0b1117;
        box-shadow:
          0 48px 130px rgba(0, 0, 0, 0.46),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        transform-origin: center center;
        will-change: transform;
      }

      .product-frame img {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .shot-add,
      .shot-openrouter {
        opacity: 0;
      }

      .cursor {
        position: absolute;
        z-index: 20;
        width: 38px;
        height: 38px;
        left: 73%;
        top: 20%;
        filter: drop-shadow(0 9px 18px rgba(0, 0, 0, 0.5));
        transform-origin: 6px 6px;
      }

      .cursor::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 0;
        height: 0;
        border-left: 0 solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 31px solid #ffffff;
      }

      .cursor::after {
        content: "";
        position: absolute;
        left: 12px;
        top: 21px;
        width: 14px;
        height: 18px;
        border-radius: 3px;
        background: #ffffff;
        transform: rotate(-29deg);
      }

      .click-ring {
        position: absolute;
        z-index: 19;
        width: 78px;
        height: 78px;
        left: 73%;
        top: 20%;
        border: 2px solid rgba(123, 216, 206, 0.88);
        border-radius: 50%;
        opacity: 0;
        transform: translate(-20px, -20px) scale(0.4);
        box-shadow: 0 0 40px rgba(123, 216, 206, 0.32);
      }

      .status-line {
        position: absolute;
        left: 106px;
        right: 106px;
        bottom: 50px;
        z-index: 8;
        display: flex;
        justify-content: space-between;
        color: rgba(199, 212, 220, 0.72);
        font-size: 18px;
        font-weight: 700;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="tokenmaxxer-cinematic-demo"
      data-start="0"
      data-duration="12"
      data-track-index="0"
      data-width="1920"
      data-height="1080"
    >
      <div class="grain" data-layout-ignore></div>

      <div class="scene-content">
        <section class="brand-stage">
          <div class="brand-lockup">
            <img src="assets/tokenmaxxer-logo.png" alt="" />
            <div class="brand-name">TokenMaxxer</div>
          </div>

          <div class="eyebrow">Open-source desktop tracker</div>
          <h1 class="headline">Track every AI limit in one local view.</h1>
          <p class="support">
            Add provider accounts, inspect reset windows, and open account-level
            detail without leaving TokenMaxxer.
          </p>
        </section>

        <section class="demo-stage">
          <div class="product-frame">
            <img class="shot shot-dashboard" src="assets/tokenmaxxer-product-shot.png" alt="" />
            <img class="shot shot-add" src="assets/tokenmaxxer-add-account-shot.png" alt="" />
            <img
              class="shot shot-openrouter"
              src="assets/tokenmaxxer-openrouter-setup-shot.png"
              alt=""
              data-layout-allow-overflow
            />
            <div class="click-ring" data-layout-ignore></div>
            <div class="cursor" data-layout-ignore></div>
          </div>
        </section>
      </div>

      <div class="status-line" data-layout-ignore>
        <span>Add account</span>
        <span>Set up OpenRouter</span>
        <span>Check windows</span>
        <span>Local-first</span>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from(".brand-lockup img", { y: 34, opacity: 0, scale: 0.78, duration: 0.8, ease: "back.out(1.5)" }, 0.18);
      tl.from(".brand-name", { x: -36, opacity: 0, duration: 0.68, ease: "expo.out" }, 0.32);
      tl.from(".eyebrow", { y: 28, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.7);
      tl.from(".headline", { y: 56, opacity: 0, duration: 0.78, ease: "circ.out" }, 0.92);
      tl.from(".support", { y: 38, opacity: 0, duration: 0.68, ease: "power2.out" }, 1.18);
      tl.from(".product-frame", { x: 86, y: 28, rotationY: -8, opacity: 0, scale: 0.88, duration: 1.08, ease: "expo.out" }, 0.52);
      tl.from(".status-line span", { y: 18, opacity: 0, duration: 0.45, stagger: 0.08, ease: "power3.out" }, 1.42);
      tl.to(".grain", { x: -20, y: -12, duration: 11.2, ease: "none" }, 0.2);
      tl.to(".product-frame", { scale: 1.02, rotationY: 1.2, duration: 8.55, ease: "sine.inOut" }, 1.75);

      tl.to(".cursor", { left: "92%", top: "9%", duration: 0.75, ease: "power3.inOut" }, 2.25);
      tl.fromTo(".click-ring", { left: "92%", top: "9%", opacity: 0.9, scale: 0.35 }, { opacity: 0, scale: 1.25, duration: 0.48, ease: "power2.out" }, 3.0);
      tl.to(".cursor", { scale: 0.82, duration: 0.12, ease: "power2.out" }, 3.02);
      tl.to(".cursor", { scale: 1, duration: 0.18, ease: "back.out(2)" }, 3.14);
      tl.to(".shot-add", { opacity: 1, duration: 0.72, ease: "power2.inOut" }, 3.22);

      tl.to(".cursor", { left: "62%", top: "52%", duration: 0.82, ease: "power3.inOut" }, 4.42);
      tl.fromTo(".click-ring", { left: "62%", top: "52%", opacity: 0.9, scale: 0.35 }, { opacity: 0, scale: 1.25, duration: 0.48, ease: "power2.out" }, 5.22);
      tl.to(".cursor", { scale: 0.82, duration: 0.12, ease: "power2.out" }, 5.24);
      tl.to(".cursor", { scale: 1, duration: 0.18, ease: "back.out(2)" }, 5.36);
      tl.to(".shot-openrouter", { opacity: 1, duration: 0.72, ease: "power2.inOut" }, 5.52);

      tl.to(".cursor", { left: "79%", top: "35%", duration: 0.7, ease: "power3.inOut" }, 7.25);
      tl.to(".shot-openrouter", { scale: 1.018, duration: 2.2, ease: "sine.inOut" }, 7.05);
      tl.to(".brand-stage", { y: -18, opacity: 0.95, duration: 1.2, ease: "power2.inOut" }, 10.35);
      tl.to(".product-frame", { scale: 1, rotationY: 0, duration: 1.05, ease: "power2.inOut" }, 10.5);

      window.__timelines["tokenmaxxer-cinematic-demo"] = tl;
    </script>
  </body>
</html>
